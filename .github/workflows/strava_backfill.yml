name: Strava Backfill

on:
  workflow_dispatch: # Manual trigger only

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    env:
      # Database Credentials (Neon)
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT || '5432' }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB || 'neondb' }}
      POSTGRES_SSLMODE: ${{ secrets.POSTGRES_SSLMODE || 'require' }}
      
      # Strava API Credentials
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: 1. API Backfill Ingestion (Bronze Layer)
        run: python ingestion/api_backfill.py

      - name: 2. Transform Data (dbt Silver and Gold Layers)
        working-directory: dbt_strava
        run: |
          dbt deps
          dbt run --profiles-dir .

      - name: 3. Data Quality Check (Great Expectations)
        run: python quality/run_validations.py
